<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackJackoss</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }

    .landing-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .landing-icon {
      font-size: 2.5rem;
      color: var(--accent);
    }

    .landing-title {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .landing-subtitle {
      font-size: 0.68rem;
      color: var(--text-faint);
      letter-spacing: 0.06em;
    }

    .landing-modes {
      display: flex;
      gap: 1.25rem;
    }

    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 2.5rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 200px;
    }

    .mode-card:hover {
      border-color: var(--accent-dim);
      background: var(--bg-raised);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .mode-card-icon { font-size: 2.2rem; }

    .mode-card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .mode-card-desc {
      font-size: 0.65rem;
      color: var(--text-faint);
      text-align: center;
      line-height: 1.7;
    }

    .mode-card.solo  { border-color: rgba(52,211,153,.18); }
    .mode-card.solo:hover  { border-color: var(--green); }
    .mode-card.multi { border-color: rgba(96,165,250,.18); }
    .mode-card.multi:hover { border-color: var(--blue); }

    .admin-link {
      position: fixed;
      bottom: 1rem;
      right: 1.25rem;
      font-size: 0.6rem;
      color: var(--text-faint);
      opacity: 0.3;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .admin-link:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing-brand">
      <span class="landing-icon">♠</span>
      <h1 class="landing-title">BlackJackoss</h1>
      <p class="landing-subtitle">Card Counting Trainer · Multiplayer</p>
    </div>

    <div class="landing-modes">
      <a class="mode-card solo" href="/solo">
        <span class="mode-card-icon">🎯</span>
        <span class="mode-card-title">Solo Training</span>
        <p class="mode-card-desc">Entraînement en solo.<br/>Stratégie de base, comptage,<br/>historique des décisions.</p>
      </a>

      <a class="mode-card multi" href="/multi">
        <span class="mode-card-icon">🃏</span>
        <span class="mode-card-title">Multijoueur</span>
        <p class="mode-card-desc">Table partagée 1-7 joueurs.<br/>Sabot commun, tours séquentiels,<br/>balances persistées.</p>
      </a>
    </div>
  </div>
  <a class="admin-link" href="/admin">admin</a>
</body>
</html>
